upstream orthovennplus_backend {
    server backend:8000;
    keepalive 32;
}

upstream orthovennplus_tusd {
    server tusd:1080;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    absolute_redirect off;
    client_max_body_size 0;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;

    location = /api {
        return 308 /api/;
    }

    location /api/ {
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_pass http://orthovennplus_backend/api/;
    }

    location = /tus/files {
        return 308 /tus/files/;
    }

    location /tus/files/ {
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_pass http://orthovennplus_tusd/files/;
        proxy_redirect /files/ /tus/files/;
        proxy_redirect ~^https?://[^/]+/files/(.*)$ /tus/files/$1;
        proxy_redirect http://127.0.0.1/files/ /tus/files/;
        proxy_redirect http://localhost/files/ /tus/files/;
        proxy_redirect http://tusd:1080/files/ /tus/files/;
        proxy_redirect http://127.0.0.1:1080/files/ /tus/files/;
        proxy_redirect http://localhost:1080/files/ /tus/files/;
    }

    location / {
        return 404;
    }
}
