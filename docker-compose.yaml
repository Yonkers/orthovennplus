name: orthovennplus

x-backend-runtime-env: &backend_runtime_env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  REDIS_HOST: redis
  REDIS_PORT: 6379
  PROJECTS_DIR: /data/projects
  UPLOAD_DIR: /data/uploads
  TASK_TEMP_DIR: /data/tmp
  LOG_DIR: /data/logs
  REFDB_DIR: /data/refdb
  BUILTIN_DB_DIR: /data/builtin_db
  UPLOAD_TUS_ENDPOINT: ${PUBLIC_TUS_ENDPOINT:-/tus/files/}

x-backend-runtime-volumes: &backend_runtime_volumes
  - ./data/projects:/data/projects
  - ./data/uploads:/data/uploads
  - ./data/tmp:/data/tmp
  - ./data/logs:/data/logs
  - ./data/refdb:/data/refdb:ro
  - ./data/builtin_db:/data/builtin_db:ro

x-biobase-worker: &biobase_worker
  image: leeoluo/orthovennplus-worker-biobase:${ORTHOVENN_IMAGE_TAG:-latest}
  restart: unless-stopped
  env_file:
    - .env
  environment:
    <<: *backend_runtime_env
  volumes: *backend_runtime_volumes
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: orthovennplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: umu1lk4o8dqhlv.xuanyuan.run/library/redis:8.6.2
    container_name: orthovennplus-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tusd:
    image: tusproject/tusd:v2
    container_name: orthovennplus-tusd
    restart: unless-stopped
    ports:
      - "${TUSD_PORT:-1080}:1080"
    volumes:
      - ./data/uploads/tus:/data/uploads/tus
    depends_on:
      backend:
        condition: service_started
    command:
      - -host=0.0.0.0
      - -port=1080
      - -upload-dir=/data/uploads/tus
      - -hooks-http=${TUSD_HOOKS_HTTP_URL:-http://backend:8000/api/core/uploads/tusd/hooks}
      - -hooks-enabled-events=pre-create,post-finish,post-terminate
      - -hooks-http-forward-headers=Authorization,X-Upload-Id
      - -cors-allow-origin=${TUSD_CORS_ALLOW_ORIGIN:-.*}

  nginx:
    image: nginx:1.27-alpine
    container_name: orthovennplus-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-18088}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      tusd:
        condition: service_started

  backend:
    image: leeoluo/orthovennplus-backend:${ORTHOVENN_IMAGE_TAG:-latest}
    container_name: orthovennplus-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *backend_runtime_env
    ports:
      - "${API_PORT}:8000"
    volumes: *backend_runtime_volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'', timeout=3).read()"']
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    <<: *biobase_worker
    container_name: orthovennplus-worker
    command: celery -A app.worker.celery_app worker -Q orthovenn_pipline,orthovenn_maintenance --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}

  interactive_worker:
    <<: *biobase_worker
    container_name: orthovennplus-interactive-worker
    command: celery -A app.worker.celery_app worker -Q orthovenn_interactive --loglevel=info --concurrency=${INTERACTIVE_WORKER_CONCURRENCY:-4}

  selection_worker:
    <<: *biobase_worker
    container_name: orthovennplus-selection-worker
    command: celery -A app.worker.celery_app worker -Q orthovenn_selection --loglevel=info --concurrency=${SELECTION_WORKER_CONCURRENCY:-2}

  orthovennplus-frontend:
    restart: unless-stopped
    image: leeoluo/orthovennplus-frontend:${ORTHOVENN_IMAGE_TAG:-latest}
    container_name: orthovennplus-web
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./docker/nginx/frontend.conf.template:/etc/nginx/sites-enabled/project.conf.template:ro
    environment:
      - API_URL=${FRONTEND_API_URL:-http://backend:8000}
      - TUS_URL=${FRONTEND_TUS_URL:-http://nginx:80}
      - NGINX_RESOLVER=127.0.0.11
    ports:
      - "${WEB_PORT:-5920}:80"

